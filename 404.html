  <header id="site-header" role="banner">
    <div class="container nav__inner">

      <a href="index.html" class="nav__logo" aria-label="Ronanto Interactive — go to homepage">

          src="images/logo/ronanto-logo.png"

          height="1024"

          decoding="async"
          draggable="false"

          <li><a href="index.html#hero"    class="nav__link" data-section="hero">Home</a></li>

        class="nav__hamburger"
        aria-label="Open navigation menu"
        aria-expanded="false"

    role="dialog"
    aria-label="Navigation menu"

       ═══════════════════════════════════════════════════════ -->

         404 BODY
         Full-viewport centered. No hero ring decoration — clean.
         ─────────────────────────────────────────────────────── -->
    <section
      id="not-found"
      class="error-page"
      aria-labelledby="error-heading"
    >
      <div class="container error-page__inner">

        <span class="error-page__code t-mono" aria-hidden="true">404</span>

        <h1 class="error-page__title t-display" id="error-heading">
          Page Not Found
        </h1>

        <p class="t-body error-page__body">
          The page you're looking for doesn't exist or may have moved.
        </p>

        <a
          href="index.html"
          class="btn btn--primary error-page__cta"
          id="return-home-btn"

        </a>

      </div>
    </section>

    document.getElementById('footer-year').textContent = new Date().getFullYear();
